AWSTemplateFormatVersion: '2010-09-09'
Description: 'WebApp Project Phase 1 - Tasks 1 and 2: VPC Setup and EC2 Instance'

Parameters:
  LatestUbuntuAMI:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/jammy/stable/current/amd64/hvm/ebs-gp2/ami-id'
    Description: 'Latest Ubuntu 22.04 LTS AMI from SSM Parameter Store'

Resources:
  # Task 1: Creating a virtual network

  # VPC
  WebAppVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  # Internet Gateway
  WebAppIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  # Attach Internet Gateway to VPC
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WebAppVPC
      InternetGatewayId: !Ref WebAppIGW

  # Public Subnet 1
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebAppVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public Subnet 1

  # Route Table for Public Subnet
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebAppVPC
      Tags:
        - Key: Name
          Value: WebApp Public Route Table

  # Public Route to Internet Gateway
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref WebAppIGW

  # Associate Route Table with Public Subnet 1
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # Task 2: Creating a virtual machine

  # Security Group for Web Application
  WebAppAPPSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: WebAppAPPSG
      GroupDescription: Security group for web application server
      VpcId: !Ref WebAppVPC
      SecurityGroupIngress:
        # SSH access
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        # HTTP access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP access for web browser
        # MySQL/Aurora access
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16
          Description: MySQL database access within VPC
      Tags:
        - Key: Name
          Value: WebAppAPPSG

  # EC2 Instance for POC
  WebAppPOC:
    Type: AWS::EC2::Instance
    DependsOn: AttachGateway
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestUbuntuAMI
      KeyName: vockey
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: '0'
          GroupSet:
            - !Ref WebAppAPPSG
          SubnetId: !Ref PublicSubnet1
      UserData:
        Fn::Base64: |
          #!/bin/bash -xe
          apt update -y
          apt install nodejs unzip wget npm mysql-server -y
          wget https://aws-tc-largeobjects.s3.us-west-2.amazonaws.com/CUR-TF-200-ACCAP1-1-91571/1-lab-capstone-project-1/code.zip -P /home/ubuntu
          cd /home/ubuntu
          unzip code.zip -x "resources/codebase_partner/node_modules/*"
          cd resources/codebase_partner
          npm install aws aws-sdk mysql
          mysql -u root -e "CREATE USER 'nodeapp' IDENTIFIED WITH mysql_native_password BY 'student12';"
          mysql -u root -e "GRANT all privileges on *.* to 'nodeapp'@'%';"
          mysql -u root -e "CREATE DATABASE STUDENTS;"
          mysql -u root -e "USE STUDENTS; CREATE TABLE students(
                      id INT NOT NULL AUTO_INCREMENT,
                      name VARCHAR(255) NOT NULL,
                      address VARCHAR(255) NOT NULL,
                      city VARCHAR(255) NOT NULL,
                      state VARCHAR(255) NOT NULL,
                      email VARCHAR(255) NOT NULL,
                      phone VARCHAR(100) NOT NULL,
                      PRIMARY KEY ( id ));"
          sed -i 's/.*bind-address.*/bind-address = 0.0.0.0/' /etc/mysql/mysql.conf.d/mysqld.cnf
          systemctl enable mysql
          service mysql restart
          export APP_DB_HOST=$(curl http://169.254.169.254/latest/meta-data/local-ipv4)
          export APP_DB_USER=nodeapp
          export APP_DB_PASSWORD=student12
          export APP_DB_NAME=STUDENTS
          export APP_PORT=80
          npm start &
          echo '#!/bin/bash -xe
          cd /home/ubuntu/resources/codebase_partner
          export APP_PORT=80
          npm start' > /etc/rc.local
          chmod +x /etc/rc.local
      Tags:
        - Key: Name
          Value: WebAppPOC

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref WebAppVPC
    Export:
      Name: !Sub '${AWS::StackName}-VPC-ID'

  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet1-ID'

  WebAppPOCInstanceId:
    Description: EC2 Instance ID for WebAppPOC
    Value: !Ref WebAppPOC

  WebAppPOCPublicIP:
    Description: Public IP address of WebAppPOC instance
    Value: !GetAtt WebAppPOC.PublicIp

  WebAppPOCPublicDNS:
    Description: Public DNS name of WebAppPOC instance
    Value: !GetAtt WebAppPOC.PublicDnsName

  WebAppURL:
    Description: URL to access the web application
    Value: !Sub 'http://${WebAppPOC.PublicDnsName}'

  SecurityGroupId:
    Description: Security Group ID for WebAppAPPSG
    Value: !Ref WebAppAPPSG
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroup-ID'
