AWSTemplateFormatVersion: '2010-09-09'
Description: 'WebApp Project Phase 4 - DynamoDB backend with ALB and Auto Scaling'

Parameters:
  LatestUbuntuAMI:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/jammy/stable/current/amd64/hvm/ebs-gp2/ami-id'
    Description: 'Latest Ubuntu 22.04 LTS AMI from SSM Parameter Store'

  # WebAppAMIId:
  #   Type: String
  #   Description: 'AMI ID of WebAppAMI - create this manually from your WebAppAppServer instance before deploying'

  CodeZipPresignedUrl:
    Type: String
    Description: 'Presigned S3 URL for your mycode.zip file containing the DynamoDB-enabled app'

Resources:

  # -------------------------------------------------------
  # VPC and Networking
  # -------------------------------------------------------

  WebAppVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  WebAppIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WebAppVPC
      InternetGatewayId: !Ref WebAppIGW

  # Public Subnet 1 (AZ 1)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebAppVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public Subnet 1

  # Public Subnet 2 (AZ 2) - required for ALB multi-AZ
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebAppVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public Subnet 2

  # Public route table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebAppVPC
      Tags:
        - Key: Name
          Value: WebApp Public Route Table

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref WebAppIGW

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # -------------------------------------------------------
  # Security Groups
  # -------------------------------------------------------

  # Security group for web app servers and ALB
  WebAppAPPSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: WebAppAPPSG
      GroupDescription: Security group for web application server and ALB
      VpcId: !Ref WebAppVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP access for web browser and ALB
      Tags:
        - Key: Name
          Value: WebAppAPPSG

  # -------------------------------------------------------
  # DynamoDB Table - replaces RDS MySQL from Phase 2/3
  # -------------------------------------------------------

  StudentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: STUDENTS
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: StudentsTable

  # -------------------------------------------------------
  # Application Load Balancer
  # -------------------------------------------------------

  WebAppTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: WebAppTG
      Port: 80
      Protocol: HTTP
      VpcId: !Ref WebAppVPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: Name
          Value: WebAppTG

  WebAppALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: AttachGateway
    Properties:
      Name: WebAppALB
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref WebAppAPPSG
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: WebAppALB

  WebAppALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebAppALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTG

  # -------------------------------------------------------
  # Auto Scaling - Launch Template and Auto Scaling Group
  # -------------------------------------------------------

  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: WebAppTemplate
      LaunchTemplateData:
        ImageId: !Ref LatestUbuntuAMI  
        InstanceType: t3.micro
        KeyName: vockey
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - !Ref WebAppAPPSG
        # Pass DynamoDB table name and AWS region to the app via user data
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            apt update -y
            apt install -y unzip wget curl

            # Install Node.js 18 LTS via NodeSource
            curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
            apt install -y nodejs

            # Download and extract app code
            wget "${CodeZipPresignedUrl}" -O /home/ubuntu/mycode.zip
            cd /home/ubuntu
            unzip mycode.zip -x "resources/codebase_partner/node_modules/*"
            cd resources/codebase_partner
            npm install aws aws-sdk uuid@9 @aws-sdk/client-dynamodb @aws-sdk/util-dynamodb

            # Write rc.local before starting the app
            cat > /etc/rc.local << 'EOF'
            #!/bin/bash -xe
            cd /home/ubuntu/resources/codebase_partner
            export APP_PORT=80
            export AWS_REGION=us-east-1
            export DYNAMODB_TABLE=STUDENTS
            /usr/bin/npm start
            EOF
            chmod +x /etc/rc.local

            # Start the app for this first boot
            export APP_PORT=80
            export AWS_REGION=us-east-1
            export DYNAMODB_TABLE=STUDENTS
            npm start &
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: Auto Scaling Instance

  WebAppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - WebAppALBListener
      - StudentsTable
    Properties:
      AutoScalingGroupName: WebAppAutoScalingGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref WebAppLaunchTemplate
        Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '1'
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      TargetGroupARNs:
        - !Ref WebAppTG
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: Auto Scaling Instance
          PropagateAtLaunch: true

  # Target tracking scaling policy - scales out when average CPU exceeds 30%
  WebAppScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WebAppAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 30.0

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref WebAppVPC
    Export:
      Name: !Sub '${AWS::StackName}-VPC-ID'

  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1

  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2

  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt WebAppALB.DNSName

  WebAppURL:
    Description: URL to access the web application via the load balancer
    Value: !Sub 'http://${WebAppALB.DNSName}'

  DynamoDBTableName:
    Description: Name of the DynamoDB Students table
    Value: !Ref StudentsTable

  DynamoDBTableARN:
    Description: ARN of the DynamoDB Students table
    Value: !GetAtt StudentsTable.Arn

  AppServerSGId:
    Description: Security Group ID for WebAppAPPSG
    Value: !Ref WebAppAPPSG
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroup-ID'

  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref WebAppAutoScalingGroup

  TargetGroupARN:
    Description: ARN of the ALB Target Group
    Value: !Ref WebAppTG